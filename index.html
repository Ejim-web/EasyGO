<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SwiftTransit | Modern Transport Solutions</title>
  <!-- Google Fonts + simple CSS reset -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafcff;
      color: #1a2c3e;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* header / nav */
    header {
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #0f2b3d;
    }

    .logo i {
      color: #2b7a4b;
      font-size: 2rem;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      color: #1f3e4b;
      transition: 0.2s;
      font-size: 1rem;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #2b7a4b;
    }

    .btn-outline {
      border: 2px solid #2b7a4b;
      background: transparent;
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 700;
      color: #2b7a4b;
      transition: 0.2s;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-outline:hover {
      background: #2b7a4b;
      color: white;
    }

    /* hero section */
    .hero {
      background: linear-gradient(135deg, #eef5f2 0%, #ffffff 100%);
      padding: 70px 0 90px;
    }

    .hero-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 50px;
      justify-content: space-between;
    }

    .hero-content {
      flex: 1.2;
    }

    .hero-badge {
      background: #dff3e8;
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1f6e43;
      margin-bottom: 20px;
    }

    .hero-content h1 {
      font-size: 3.2rem;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #0a2a36;
      margin-bottom: 20px;
    }

    .hero-content p {
      font-size: 1.2rem;
      color: #3a5b6e;
      max-width: 550px;
      margin-bottom: 32px;
    }

    .hero-buttons {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #2b7a4b;
      color: white;
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 700;
      text-decoration: none;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #1f5f3a;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: white;
      color: #1f3e4b;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      border: 1px solid #cfdfd6;
      transition: 0.2s;
    }

    .hero-image {
      flex: 1;
      text-align: center;
    }

    .hero-image i {
      font-size: 14rem;
      color: #2b7a4b;
      opacity: 0.85;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,0.1));
    }

    /* services section */
    .section {
      padding: 80px 0;
    }

    .section-title {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .section-sub {
      text-align: center;
      color: #5a7e92;
      max-width: 650px;
      margin: 0 auto 56px;
      font-size: 1.1rem;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 40px;
    }

    .service-card {
      background: white;
      border-radius: 32px;
      padding: 32px 24px;
      text-align: center;
      transition: all 0.25s ease;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.03);
      border: 1px solid #e9f0ec;
    }

    .service-card:hover {
      transform: translateY(-6px);
      border-color: #cde3d8;
      box-shadow: 0 20px 32px rgba(43, 122, 75, 0.08);
    }

    .service-icon {
      font-size: 3rem;
      background: #ecf9f2;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      margin: 0 auto 24px;
      color: #2b7a4b;
    }

    .service-card h3 {
      font-size: 1.6rem;
      margin-bottom: 12px;
    }

    .service-card p {
      color: #4a6f82;
    }

    /* booking / quote section */
    .booking-section {
      background: #0f2b3d;
      color: white;
    }

    .booking-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      align-items: center;
    }

    .booking-text {
      flex: 1;
    }

    .booking-text h2 {
      font-size: 2rem;
      margin-bottom: 16px;
    }

    .booking-text p {
      opacity: 0.85;
      margin-bottom: 24px;
    }

    .quote-form {
      flex: 1.2;
      background: white;
      border-radius: 36px;
      padding: 32px 28px;
      color: #1a2c3e;
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
    }

    .form-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1;
      min-width: 140px;
    }

    .quote-form input, .quote-form select {
      width: 100%;
      padding: 14px 18px;
      border-radius: 28px;
      border: 1px solid #cfdfd6;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background: #fff;
      transition: 0.2s;
    }

    .quote-form input:focus, .quote-form select:focus {
      outline: none;
      border-color: #2b7a4b;
      box-shadow: 0 0 0 3px rgba(43,122,75,0.2);
    }

    .quote-form button {
      background: #2b7a4b;
      color: white;
      width: 100%;
      border: none;
      padding: 14px;
      font-weight: 700;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .quote-form button:hover {
      background: #1f5f3a;
    }

    .message-result {
      margin-top: 16px;
      font-size: 0.9rem;
      text-align: center;
      font-weight: 500;
    }

    /* why choose us */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 48px;
      margin-top: 20px;
    }

    .feature-item {
      text-align: center;
    }

    .feature-item i {
      font-size: 2.5rem;
      background: #eef3f0;
      padding: 18px;
      border-radius: 60px;
      color: #2b7a4b;
      margin-bottom: 20px;
    }

    .feature-item h4 {
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    /* footer */
    footer {
      background: #0c212e;
      color: #cddfe6;
      padding: 48px 0 30px;
    }

    .footer-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 40px;
      margin-bottom: 40px;
    }

    .footer-brand p {
      margin-top: 12px;
      max-width: 260px;
      font-size: 0.9rem;
    }

    .footer-links {
      display: flex;
      gap: 56px;
      flex-wrap: wrap;
    }

    .footer-links h4 {
      color: white;
      margin-bottom: 18px;
      font-size: 1rem;
    }

    .footer-links ul {
      list-style: none;
    }

    .footer-links li {
      margin-bottom: 10px;
    }

    .footer-links a {
      text-decoration: none;
      color: #bbd1db;
      transition: 0.2s;
    }

    .footer-links a:hover {
      color: white;
    }

    .social-icons {
      display: flex;
      gap: 20px;
      font-size: 1.4rem;
      margin-top: 12px;
    }

    .copyright {
      border-top: 1px solid #2a4b5e;
      padding-top: 28px;
      text-align: center;
      font-size: 0.8rem;
    }

    @media (max-width: 800px) {
      .navbar {
        flex-direction: column;
      }
      .hero-content h1 {
        font-size: 2.4rem;
      }
      .hero-image i {
        font-size: 8rem;
      }
      .container {
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="navbar">
      <div class="logo">
        <i class="fas fa-truck-fast"></i>
        <span>SwiftTransit</span>
      </div>
      <ul class="nav-links">
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#booking">Get Quote</a></li>

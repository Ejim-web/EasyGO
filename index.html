<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>EasyGo | Live Driver Tracking • Real Location</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f2027; min-height: 100vh; }
        .app-container { max-width: 500px; margin: 0 auto; background: #f4f7fc; min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.2); }
        
        .mode-switcher { display: flex; background: white; padding: 8px; border-radius: 60px; margin: 12px; gap: 8px; }
        .mode-btn { flex: 1; text-align: center; padding: 12px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; background: #f1f3f5; }
        .mode-btn.active { background: #00b67a; color: white; }
        
        .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .auth-card { background: white; border-radius: 40px; padding: 40px 28px; width: 100%; max-width: 400px; }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo i { font-size: 3rem; color: #00b67a; background: #e6f7ef; padding: 16px; border-radius: 60px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .input-group input, .input-group select { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 1rem; }
        .btn-primary { background: #00b67a; color: white; width: 100%; padding: 14px; border: none; border-radius: 40px; font-weight: 700; cursor: pointer; }
        .btn-danger { background: #ef4444; }
        .auth-switch { text-align: center; margin-top: 24px; color: #718096; }
        .auth-switch a { color: #00b67a; font-weight: 600; cursor: pointer; }
        
        .main-app { display: none; }
        .app-header { background: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .logo-area { display: flex; align-items: center; gap: 8px; font-size: 1.3rem; font-weight: 800; }
        .logo-area i { color: #00b67a; }
        
        .map-container { position: relative; }
        #riderMap, #driverMap { height: 280px; width: 100%; z-index: 1; }
        .map-buttons { position: absolute; bottom: 10px; right: 10px; display: flex; gap: 8px; z-index: 2; }
        .map-btn { background: white; border: none; padding: 8px 14px; border-radius: 50px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: pointer; font-weight: 600; font-size: 0.75rem; }
        
        .location-panel { background: white; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
        .location-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
        .location-dot { width: 10px; height: 10px; border-radius: 10px; background: #00b67a; }
        .location-dot.red { background: #ef4444; }
        .search-wrapper { flex: 1; position: relative; }
        .location-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 30px; padding: 12px 16px; font-size: 0.9rem; outline: none; background: #f8fafc; }
        
        .bid-section { background: white; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
        .bid-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .bid-input { flex: 2; border: 2px solid #e2e8f0; border-radius: 30px; padding: 12px 16px; font-size: 1rem; font-weight: 700; text-align: center; }
        
        .ride-types { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; background: white; }
        .ride-card { text-align: center; padding: 10px 6px; border-radius: 16px; cursor: pointer; border: 2px solid transparent; }
        .ride-card.active { background: #e6f7ef; border-color: #00b67a; }
        
        .action-panel { background: white; margin: 12px; border-radius: 24px; padding: 16px; }
        .price-box { background: #f7f9fc; padding: 12px; border-radius: 16px; display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 12px; }
        
        .ride-status-card { background: #fff7ed; border-radius: 20px; padding: 16px; margin-top: 12px; display: none; }
        .driver-info { display: flex; align-items: center; gap: 12px; margin-top: 12px; padding: 12px; background: white; border-radius: 20px; }
        
        .driver-panel { display: none; }
        .online-toggle { background: white; margin: 12px; padding: 16px; border-radius: 24px; text-align: center; }
        .toggle-switch { width: 70px; height: 36px; background: #e2e8f0; border-radius: 36px; margin: 12px auto; cursor: pointer; position: relative; }
        .toggle-switch.on { background: #00b67a; }
        .toggle-switch::after { content: ""; width: 30px; height: 30px; background: white; border-radius: 30px; position: absolute; top: 3px; left: 3px; transition: 0.2s; }
        .toggle-switch.on::after { left: 37px; }
        
        .ride-request-card { background: white; margin: 12px; padding: 16px; border-radius: 24px; border-left: 5px solid #00b67a; }
        .accept-btn { background: #00b67a; color: white; border: none; padding: 10px; border-radius: 40px; width: 100%; margin-top: 10px; font-weight: 700; cursor: pointer; }
        
        .earnings-card { background: white; margin: 12px; padding: 16px; border-radius: 24px; text-align: center; }
        .history-section { margin: 12px; background: white; border-radius: 24px; padding: 16px; }
        .history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #1e2a3a; color: white; padding: 12px; border-radius: 60px; text-align: center; z-index: 1000; display: none; }
        .distance-badge { background: #00b67a; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-bolt"></i><h2>EasyGo</h2><p>Live driver tracking • Real location</p></div>
            <div id="loginPanel">
                <div class="input-group"><label>Email</label><input type="email" id="loginEmail" placeholder="Email"></div>
                <div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Password"></div>
                <div class="input-group"><label>I am a</label><select id="loginRole"><option value="rider">Rider</option><option value="driver">Driver</option></select></div>
                <button class="btn-primary" onclick="handleLogin()">Sign In</button>
                <div class="auth-switch">New? <a onclick="showRegister()">Create account</a></div>
            </div>
            <div id="registerPanel" style="display:none;">
                <div class="input-group"><label>Name</label><input type="text" id="regName"></div>
                <div class="input-group"><label>Email</label><input type="email" id="regEmail"></div>
                <div class="input-group"><label>Password</label><input type="password" id="regPassword"></div>
                <div class="input-group"><label>Role</label><select id="regRole"><option value="rider">Rider</option><option value="driver">Driver</option></select></div>
                <button class="btn-primary" onclick="handleRegister()">Create</button>
                <div class="auth-switch">Have account? <a onclick="showLogin()">Sign In</a></div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="main-app">
        <div class="app-header">
            <div class="logo-area"><i class="fas fa-bolt"></i><span>EasyGo</span></div>
            <div><span id="roleBadge"></span><button onclick="handleLogout()" style="margin-left:8px; background:#fee2e2; border:none; padding:6px 12px; border-radius:40px;">Exit</button></div>
        </div>

        <div id="modeSwitcher" class="mode-switcher" style="display:none;">
            <button class="mode-btn" onclick="switchMode('rider')">🚗 Ride</button>
            <button class="mode-btn" onclick="switchMode('driver')">🚘 Drive</button>
        </div>

        <!-- RIDER VIEW with LIVE DRIVER TRACKING -->
        <div id="riderView">
            <div class="map-container">
                <div id="riderMap" style="height: 300px;"></div>
                <div class="map-buttons">
                    <button class="map-btn" onclick="centerRiderMap()"><i class="fas fa-location-dot"></i> My Location</button>
                </div>
            </div>
            <div class="location-panel">
                <div class="location-row"><div class="location-dot"></div><input type="text" id="pickupInput" class="location-input" placeholder="📍 Click map OR type address"></div>
                <div class="location-row"><div class="location-dot red"></div><input type="text" id="dropoffInput" class="location-input" placeholder="🏁 Destination"></div>
            </div>
            <div class="bid-section">
                <div class="bid-row">
                    <i class="fas fa-money-bill-wave"></i>
                    <input type="number" id="bidAmount" class="bid-input" value="8" step="0.5" min="2">
                </div>
            </div>
            <div class="ride-types">
                <div class="ride-card active" data-ride="economy"><i class="fas fa-car"></i><div>Economy</div></div>
                <div class="ride-card" data-ride="comfort"><i class="fas fa-car-side"></i><div>Comfort</div></div>
                <div class="ride-card" data-ride="premium"><i class="fas fa-gem"></i><div>Premium</div></div>
            </div>
            <div class="action-panel">
                <div class="price-box"><span>💰 Your offer</span><span id="displayBid">$8.00</span></div>
                <button class="btn-primary" id="requestBtn" onclick="requestRide()">🚀 Post Ride Offer</button>
                <div id="rideStatusPanel" style="display:none; margin-top:12px;">
                    <div id="statusText" style="background:#fff7ed; padding:12px; border-radius:16px;"></div>
                    <div id="driverLiveLocation" style="margin-top:12px; display:none;">
                        <div class="driver-info">
                            <i class="fas fa-car" style="font-size:1.5rem;"></i>
                            <div><strong id="driverNameTrack"></strong><br><span id="driverDistance"></span></div>
                        </div>
                    </div>
                    <button class="btn-danger" onclick="cancelRide()" style="margin-top:8px;">Cancel Ride</button>
                </div>
            </div>
            <div class="history-section"><strong>📜 My Rides</strong><div id="rideHistoryList"></div></div>
        </div>

        <!-- DRIVER VIEW with location sharing -->
        <div id="driverView" style="display:none;">
            <div class="map-container">
                <div id="driverMap" style="height: 250px;"></div>
                <div class="map-buttons">
                    <button class="map-btn" onclick="centerDriverMap()"><i class="fas fa-location-dot"></i> My Location</button>
                </div>
            </div>
            <div class="online-toggle">
                <h4>Driver Status</h4>
                <div id="toggleSwitch" class="toggle-switch" onclick="toggleOnline()"></div>
                <p id="onlineStatusText">⚫ Offline</p>
            </div>
            <div class="earnings-card">
                <h4>💰 Today's Earnings</h4>
                <h2 id="todayEarnings">$0</h2>
                <p id="tripsCompleted">0 trips</p>
            </div>
            <div id="incomingRequests">
                <h4 style="margin:12px;">📢 Ride Offers</h4>
                <div id="requestsList"></div>
            </div>
            <div class="history-section"><strong>📜 Driver History</strong><div id="driverHistoryList"></div></div>
        </div>
    </div>
    <div id="toastMsg" class="toast"></div>
</div>

<script>
    let currentUser = null, currentMode = "rider", activeRide = null, activeDriverJob = null, isOnline = false;
    let riderMap, driverMap, riderMarker, driverMarker, driverLiveMarker = null;
    let riderLat = 40.7128, riderLng = -74.0060, driverLat = 40.7128, driverLng = -74.0060;
    let locationInterval = null;
    let selectedRideType = "economy";
    let rideCheckInterval = null;

    document.getElementById('bidAmount')?.addEventListener('input', function() {
        document.getElementById('displayBid').innerHTML = `$${parseFloat(this.value || 0).toFixed(2)}`;
    });

    async function reverseGeocode(lat, lng) {
        try {
            let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18`);
            let data = await res.json();
            return data.display_name?.substring(0, 50) || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        } catch(e) { return `${lat.toFixed(4)}, ${lng.toFixed(4)}`; }
    }

    function showToast(msg, isError = false) {
        let toast = document.getElementById('toastMsg');
        toast.style.backgroundColor = isError ? '#ef4444' : '#00b67a';
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
    }

    // RIDER MAP - click to set pickup
    function initRiderMap() {
        if (riderMap) riderMap.remove();
        riderMap = L.map('riderMap').setView([riderLat, riderLng], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(riderMap);
        riderMarker = L.marker([riderLat, riderLng], { draggable: true }).addTo(riderMap);
        
        riderMarker.on('dragend', async (e) => {
            let pos = e.target.getLatLng();
            riderLat = pos.lat; riderLng = pos.lng;
            document.getElementById('pickupInput').value = await reverseGeocode(riderLat, riderLng);
        });
        
        riderMap.on('click', async (e) => {
            riderLat = e.latlng.lat; riderLng = e.latlng.lng;
            riderMarker.setLatLng([riderLat, riderLng]);
            document.getElementById('pickupInput').value = await reverseGeocode(riderLat, riderLng);
            showToast("📍 Pickup location set!");
        });
    }

    // DRIVER MAP with real location sharing
    function initDriverMap() {
        if (driverMap) driverMap.remove();
        driverMap = L.map('driverMap').setView([driverLat, driverLng], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(driverMap);
        driverMarker = L.marker([driverLat, driverLng], { draggable: true }).addTo(driverMap);
        driverMarker.on('dragend', (e) => {
            driverLat = e.target.getLatLng().lat;
            driverLng = e.target.getLatLng().lng;
            updateDriverLocation();
        });
    }

    async function centerRiderMap() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                riderLat = pos.coords.latitude; riderLng = pos.coords.longitude;
                riderMap.setView([riderLat, riderLng], 15);
                riderMarker.setLatLng([riderLat, riderLng]);
                document.getElementById('pickupInput').value = await reverseGeocode(riderLat, riderLng);
            }, () => showToast("Enable location", true));
        }
    }

    function centerDriverMap() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                driverLat = pos.coords.latitude; driverLng = pos.coords.longitude;
                driverMap.setView([driverLat, driverLng], 15);
                driverMarker.setLatLng([driverLat, driverLng]);
                updateDriverLocation();
            }, () => showToast("Enable location", true));
        }
    }

    function updateDriverLocation() {
        if (currentUser?.role === 'driver' && isOnline) {
            localStorage.setItem('easygo_driver_location', JSON.stringify({ lat: driverLat, lng: driverLng, driverId: currentUser.id, driverName: currentUser.name }));
        }
    }

    function startDriverLocationSharing() {
        if (locationInterval) clearInterval(locationInterval);
        locationInterval = setInterval(() => {
            if (currentUser?.role === 'driver' && isOnline && activeDriverJob) {
                updateDriverLocation();
            }
        }, 3000);
    }

    // User DB
    function getUsers() {
        let users = localStorage.getItem('easygo_track_users');
        if (!users) {
            users = [
                { id: 'r1', name: 'John Rider', email: 'rider@easygo.com', password: '123', role: 'rider', rides: [] },
                { id: 'd1', name: 'Mike Driver', email: 'driver@easygo.com', password: '123', role: 'driver', earnings: 0, trips: [] }
            ];
            localStorage.setItem('easygo_track_users', JSON.stringify(users));
        }
        return JSON.parse(users);
    }
    function saveUsers(users) { localStorage.setItem('easygo_track_users', JSON.stringify(users)); }

    function handleRegister() {
        let name = document.getElementById('regName').value.trim();
        let email = document.getElementById('regEmail').value.trim();
        let pass = document.getElementById('regPassword').value.trim();
        let role = document.getElementById('regRole').value;
        if (!name || !email || !pass) { showToast('Fill all fields', true); return; }
        let users = getUsers();
        if (users.find(u => u.email === email)) { showToast('Email exists', true); return; }
        users.push({ id: Date.now().toString(), name, email, password: pass, role, rides: [], earnings: 0, trips: [] });
        saveUsers(users);
        showToast('Account created! Please login.');
        showLogin();
    }

    function handleLogin() {
        let email = document.getElementById('loginEmail').value.trim();
        let pass = document.getElementById('loginPassword').value.trim();
        let role = document.getElementById('loginRole').value;
        let users = getUsers();
        let user = users.find(u => u.email === email && u.password === pass && u.role === role);
        if (user) {
            currentUser = user;
            localStorage.setItem('easygo_track_session', JSON.stringify({ id: user.id, role: user.role }));
            showMainApp();
        } else { showToast('Invalid credentials', true); }
    }

    function handleLogout() {
        if (locationInterval) clearInterval(locationInterval);
        localStorage.removeItem('easygo_track_session');
        currentUser = null;
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('authScreen').style.display = 'flex';
        showLogin();
    }

    function showMainApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        let session = JSON.parse(localStorage.getItem('easygo_track_session'));
        let users = getUsers();
        currentUser = users.find(u => u.id === session.id);
        document.getElementById('roleBadge').innerHTML = currentUser.role === 'driver' ? '🚘 Driver' : '🚗 Rider';
        
        if (currentUser.role === 'driver') {
            document.getElementById('modeSwitcher').style.display = 'flex';
            initDriverMap();
            switchMode('driver');
            startDriverLocationSharing();
        } else {
            document.getElementById('modeSwitcher').style.display = 'none';
            initRiderMap();
            switchMode('rider');
        }
        renderRideHistory();
        if (currentUser.role === 'driver') renderDriverDashboard();
    }

    function switchMode(mode) {
        currentMode = mode;
        if (mode === 'rider') {
            document.getElementById('riderView').style.display = 'block';
            document.getElementById('driverView').style.display = 'none';
            if (riderMap) setTimeout(() => riderMap.invalidateSize(), 100);
        } else {
            document.getElementById('riderView').style.display = 'none';
            document.getElementById('driverView').style.display = 'block';
            if (driverMap) setTimeout(() => driverMap.invalidateSize(), 100);
            renderDriverDashboard();
        }
    }

    document.querySelectorAll('.ride-card').forEach(card => {
        card.addEventListener('click', function() {
            document.querySelectorAll('.ride-card').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            selectedRideType = this.getAttribute('data-ride');
        });
    });

    // RIDER: Post ride with bid
    function requestRide() {
        if (activeRide) { showToast('Complete current ride first', true); return; }
        let pickup = document.getElementById('pickupInput').value || "Selected location";
        let dropoff = document.getElementById('dropoffInput').value || "Destination";
        let bid = parseFloat(document.getElementById('bidAmount').value) || 5;
        if (bid < 2) { showToast('Minimum $2', true); return; }
        
        let ride = {
            id: 'R' + Date.now(), riderId: currentUser.id, riderName: currentUser.name,
            pickup, dropoff, bidAmount: bid, rideType: selectedRideType,
            pickupLat: riderLat, pickupLng: riderLng,
            status: 'pending', driverId: null, driverName: null
        };
        let rides = JSON.parse(localStorage.getItem('easygo_track_rides') || '[]');
        rides.push(ride);
        localStorage.setItem('easygo_track_rides', JSON.stringify(rides));
        activeRide = ride;
        
        let panel = document.getElementById('rideStatusPanel');
        panel.style.display = 'block';
        document.getElementById('statusText').innerHTML = `🕐 Offering $${bid}... Waiting for driver`;
        document.getElementById('driverLiveLocation').style.display = 'none';
        document.getElementById('requestBtn').disabled = true;
        showToast(`💰 Offer $${bid} posted!`);
        
        if (rideCheckInterval) clearInterval(rideCheckInterval);
        rideCheckInterval = setInterval(() => {
            let updated = JSON.parse(localStorage.getItem('easygo_track_rides') || '[]').find(r => r.id === ride.id);
            if (updated?.status === 'accepted') {
                clearInterval(rideCheckInterval);
                activeRide = updated;
                document.getElementById('statusText').innerHTML = `✅ Driver ${updated.driverName} accepted! Watching their location...`;
                document.getElementById('driverNameTrack').innerHTML = updated.driverName;
                document.getElementById('driverLiveLocation').style.display = 'block';
                startTrackingDriver(updated.driverId);
            } else if (updated?.status === 'completed') {
                clearInterval(rideCheckInterval);
                completeRideFromPoll();
            }
        }, 2000);
    }

    // LIVE DRIVER TRACKING on rider map
    let trackingInterval = null;
    function startTrackingDriver(driverId) {
        if (trackingInterval) clearInterval(trackingInterval);
        
        // Add driver marker on rider map
        if (driverLiveMarker) riderMap.removeLayer(driverLiveMarker);
        driverLiveMarker = L.marker([driverLat, driverLng], { icon: L.divIcon({ html: '<i class="fas fa-car" style="font-size:24px; color:#00b67a;"></i>', className: 'custom-div-icon', iconSize: [24, 24] }) }).addTo(riderMap);
        
        trackingInterval = setInterval(async () => {
            let driverLoc = JSON.parse(localStorage.getItem('easygo_driver_location') || '{}');
            if (driverLoc.driverId === driverId && driverLoc.lat) {
                driverLiveMarker.setLatLng([driverLoc.lat, driverLoc.lng]);
                riderMap.setView([driverLoc.lat, driverLoc.lng], 13);
                
                // Calculate distance
                let distance = getDistanceFromLatLonInKm(driverLoc.lat, driverLoc.lng, riderLat, riderLng);
                document.getElementById('driverDistance').innerHTML = `📍 ${distance.toFixed(1)} km away • Coming to you!`;
            }
        }, 2000);
    }
    
    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
        let R = 6371;
        let dLat = (lat2 - lat1) * Math.PI / 180;
        let dLon = (lon2 - lon1) * Math.PI / 180;
        let a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    
    function completeRideFromPoll() {
        if (activeRide) {
            let users = getUsers();
            let rider = users.find(u => u.id === currentUser.id);
            if (rider) {
                if (!rider.rides) rider.rides = [];
                rider.rides.unshift({ id: activeRide.id, pickup: activeRide.pickup, dropoff: activeRide.dropoff, fare: activeRide.bidAmount, rideType: activeRide.rideType, driver: activeRide.driverName, date: new Date().toLocaleString() });
                saveUsers(users);
                currentUser = rider;
            }
            showToast(`Trip completed! $${activeRide.bidAmount} paid.`);
            if (trackingInterval) clearInterval(trackingInterval);
            activeRide = null;
            document.getElementById('rideStatusPanel').style.display = 'none';
            document.getElementById('requestBtn').disabled = false;
            renderRideHistory();
        }
    }
    
    function cancelRide() {
        if (activeRide?.status === 'pending') {
            let rides = JSON.parse(localStorage.getItem('easygo_track_rides') || '[]');
            rides = rides.filter(r => r.id !== activeRide.id);
            localStorage.setItem('easygo_track_rides', JSON.stringify(rides));
            if (rideCheckInterval) clearInterval(rideCheckInterval);
            if (trackingInterval) clearInterval(trackingInterval);
            activeRide = null;
            document.getElementById('rideStatusPanel').style.display = 'none';
            document.getElementById('requestBtn').disabled = false;
            showToast('Ride cancelled');
        }
    }
    
    function renderRideHistory() {
        let div = document.getElementById('rideHistoryList');
        if (!currentUser?.rides?.length) { div.innerHTML = '<p style="color:#94a3b8;">No rides yet</p>'; return; }
        div.innerHTML = currentUser.rides.slice(0,5).map(r => `<div class="history-item"><div><strong>${r.rideType}</strong><br><small>${r.pickup?.substring(0,20)}</small></div><div><strong>$${r.fare}</strong></div></div>`).join('');
    }

    // DRIVER FUNCTIONS
    function toggleOnline() {
        isOnline = !isOnline;
        let toggle = document.getElementById('toggleSwitch');
        let statusText = document.getElementById('onlineStatusText');
        if (isOnline) {
            toggle.classList.add('on');
            statusText.innerHTML = '🟢 Online - Receiving offers';
            showToast('You are ONLINE!');
            checkRideOffers();
        } else {
            toggle.classList.remove('on');
            statusText.innerHTML = '⚫ Offline';
            localStorage.removeItem('easygo_driver_location');
            document.getElementById('requestsList').innerHTML = '<p style="text-align:center;">Go online to see offers</p>';
        }
    }
    
    function checkRideOffers() {
        if (!isOnline) return;
        let rides = JSON.parse(localStorage.getItem('easygo_track_rides') || '[]');
        let pending = rides.filter(r => r.status === 'pending');
        if (pending.length > 0) {
            document.getElementById('requestsList').innerHTML = pending.map(r => `
                <div class="ride-request-card">
                    <strong>💰 $${r.bidAmount} offer</strong><br>
                    📍 ${r.pickup.substring(0,35)}<br>
                    📍 → ${r.dropoff.substring(0,35)}<br>
                    🚗 ${r.rideType}<br>
                    <button class="accept-btn" onclick="acceptRideOffer('${r.id}')">✅ Accept - Earn $${r.bidAmount}</button>
                </div>
            `).join('');
        } else {
            document.getElementById('requestsList').innerHTML = '<p style="text-align:center;">No ride offers yet</p>';
        }
        setTimeout(() => checkRideOffers(), 3000);
    }
    
    function acceptRideOffer(rideId) {
        let rides = JSON.parse(localStorage.getItem('easygo_track_rides') || '[]');
        let idx = rides.findIndex(r => r.id === rideId);
        if (idx !== -1 && rides[idx].status === 'pending') {
            rides[idx].status = 'accepted';
            rides[idx].driverId = currentUser.id;
            rides[idx].driverName = currentUser.name;
            localStorage.setItem('easygo_track_rides', JSON.stringify(rides));
            activeDriverJob = rides[idx];
            showToast(`✅ Accepted $${activeDriverJob.bidAmount} ride!`);
            document.getElementById('requestsList').innerHTML = `<div class="ride-request-card"><strong>🚗 Ride in progress</strong><br>Going to: ${activeDriverJob.dropoff}<br>💰 $${activeDriverJob.bidAmount}<br><button class="btn-primary" onclick="completeDriverRide()">Complete Ride</button></div>`;
            updateDriverLocation();
        }
    }
    
    function completeDriverRide() {
        if (!activeDriverJob) return;
        let users = getUsers();
        let driver = users.find(u => u.id === currentUser.id);
        if (driver) {
            driver.earnings = (driver.earnings || 0) + activeDriverJob.bidAmount;
            if (!driver.trips) driver.trips = [];
            driver.trips.unshift({ id: activeDriverJob.id, fare: activeDriverJob.bidAmount, rider: activeDriverJob.riderName, date: new Date().toLocaleString() });
            saveUsers(users);
            currentUser = driver;
        }
        let rides = JSON.parse(localStorage.getItem('easygo_track_rides') || '[]');
        let idx = rides.findIndex(r => r.id === activeDriverJob.id);
        if (idx !== -1) rides[idx].status = 'completed';
        localStorage.setItem('easygo_track_rides', JSON.stringify(rides));
        showToast(`🎉 Trip complete! +$${activeDriverJob.bidAmount}`);
        activeDriverJob = null;
        renderDriverDashboard();
        if (isOnline) checkRideOffers();
    }
    
    function renderDriverDashboard() {
        document.getElementById('todayEarnings').innerHTML = `$${currentUser.earnings || 0}`;
        document.getElementById('tripsCompleted').innerHTML = `${currentUser.trips?.length || 0} trips`;
        let div = document.getElementById('driverHistoryList');
        if (!currentUser.trips?.length) { div.innerHTML = '<p>No trips yet</p>'; return; }
        div.innerHTML = currentUser.trips.slice(0,5).map(t => `<div class="history-item"><div>Trip with ${t.rider}</div><div>$${t.fare}</div></div>`).join('');
    }
    
    function showRegister() { document.getElementById('loginPanel').style.display = 'none'; document.getElementById('registerPanel').style.display = 'block'; }
    function showLogin() { document.getElementById('loginPanel').style.display = 'block'; document.getElementById('registerPanel').style.display = 'none'; }
    
    function init() {
        let session = localStorage.getItem('easygo_track_session');
        if (session) {
            let s = JSON.parse(session);
            let users = getUsers();
            let u = users.find(u => u.id === s.id);
            if (u) { currentUser = u; showMainApp(); }
            else { document.getElementById('authScreen').style.display = 'flex'; showLogin(); }
        } else { document.getElementById('authScreen').style.display = 'flex'; showLogin(); }
    }
    window.onload = init;
</script>
</body>
</html>
